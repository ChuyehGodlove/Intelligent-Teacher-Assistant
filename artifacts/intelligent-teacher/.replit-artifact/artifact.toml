kind = "web"
previewPath = "/"
title = "Intelligent Teacher Assistant"
version = "1.0.0"
id = "artifacts/intelligent-teacher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19544

[services.development]
run = "pnpm --filter @workspace/intelligent-teacher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/intelligent-teacher", "run", "build" ]
publicDir = "artifacts/intelligent-teacher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19544"
BASE_PATH = "/"
